llm:
  base_url: "https://token-plan-cn.xiaomimimo.com/anthropic"
  api_key: "${MIMO_API_KEY}"
  model: "mimo-2.5-pro"
  max_tokens: 4096
  temperature: 0.7

adapters:
  default: "dreamina"
  dreamina:
    download_dir: "./downloads"
    poll_timeout: 60
    max_retries: 3

video:
  default_duration: 60
  segment_durations: [5, 10]
  default_ratio: "16:9"
  default_resolution: "720P"
  ffmpeg:
    concat_method: "demuxer"
    output_codec: "libx264"
    output_format: "mp4"

projects:
  base_dir: "./projects"
